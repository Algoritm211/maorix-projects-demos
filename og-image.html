<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #111111;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      position: relative;
    }

    /* grid texture */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(157,135,201,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(157,135,201,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* center glow */
    body::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(157,135,201,0.10) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      position: relative;
      font-size: 112px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #9d87c9;
      line-height: 1;
    }

    .logo span { color: #6d5d99; }

    .divider {
      position: relative;
      width: 40px;
      height: 2px;
      background: #2a2a2a;
      border-radius: 2px;
    }

    .tagline {
      position: relative;
      font-size: 16px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: #3d3555;
    }
  </style>
</head>
<body>
  <div class="logo">MAORI<span>X</span></div>
  <div class="divider"></div>
  <div class="tagline">Design Demos &amp; Prototypes</div>
</body>
</html>
